<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<title>Dashboard</title>
	<link rel="stylesheet" href="style.css">
	<link rel="icon" type="image/x-icon" href="favicon.ico">
	<script src="nav.js"></script>
	<script src="gauge.js"></script>
	<script src="thermometer.js"></script>
</head>
<body>
	<left-nav />
	<!-- Main Content Section -->
	<div class="main">
		<h2>Dashboard</h2>
		<hr size="1" />
		<div class="card-container">
			<div class="card" style="width: 200px; text-align: center;" onclick="document.getElementById('underconstruction').showModal()">
				<h4>Burnout Level</h4>
				<script>getAnimatedThermometerSVG(53, 168);</script>
			</div>
			<div class="card" id="gauge1" style="width: 200px; text-align: center;" onclick="document.getElementById('underconstruction').showModal()">
				<h4>Purpose Alignment</h4>
				<script>makeGauge(document.getElementById('gauge1'), 'HEALTH SCORE', 86);</script>
			</div>
			<div class="card" id="gauge2" style="width: 200px; text-align: center;" onclick="document.getElementById('underconstruction').showModal()">
				<h4>Leveraging Strengths</h4>
				<script>makeGauge(document.getElementById('gauge2'), 'HEALTH SCORE', 79);</script>
			</div>
			<div class="card" id="gauge3" style="width: 200px; text-align: center;" onclick="window.location.href='individual.html'">
				<h4>Career Path Visibility</h4>
				<script>makeGauge(document.getElementById('gauge3'), 'HEALTH SCORE', 93);</script>
			</div>
			<div class="card" id="gauge4" style="width: 200px; text-align: center;" onclick="document.getElementById('underconstruction').showModal()">
				<h4>Training Awareness</h4>
				<script>makeGauge(document.getElementById('gauge4'), 'HEALTH SCORE', 76);</script>
			</div>
			<div class="card" id="gauge5" style="width: 200px; text-align: center;" onclick="document.getElementById('underconstruction').showModal()">
				<h4>Role Clarity</h4>
				<script>makeGauge(document.getElementById('gauge5'), 'HEALTH SCORE', 95);</script>
			</div>
			<div class="card" id="gauge6" style="width: 200px; text-align: center;" onclick="document.getElementById('underconstruction').showModal()">
				<h4>Feeling Supported</h4>
				<script>makeGauge(document.getElementById('gauge6'), 'HEALTH SCORE', 79);</script>
			</div>
			<div class="card" id="gauge7" style="width: 200px; text-align: center;" onclick="document.getElementById('underconstruction').showModal()">
				<h4>Connections</h4>
				<script>makeGauge(document.getElementById('gauge7'), 'HEALTH SCORE', 77);</script>
			</div>
			<div class="card" id="gauge8" style="width: 200px; text-align: center;" onclick="document.getElementById('underconstruction').showModal()">
				<h4>Openness to Change</h4>
				<script>makeGauge(document.getElementById('gauge8'), 'HEALTH SCORE', 71);</script>
			</div>
			<div class="card" id="gauge9" style="width: 200px; text-align: center;" onclick="document.getElementById('underconstruction').showModal()">
				<h4>Bias to Action</h4>
				<script>makeGauge(document.getElementById('gauge9'), 'HEALTH SCORE', 82);</script>
			</div>
			<div style="width: 100%;"><!-- ADD BUTTON, ON ITS OWN ROW -->
				<button type="button" onclick="document.getElementById('underconstruction').showModal()">Add +</button>
			</div>
		</div>
	</div>
</body>
</html>
