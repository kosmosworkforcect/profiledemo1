<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<title>Assessments</title>
	<link rel="stylesheet" href="style.css">
	<link rel="icon" type="image/x-icon" href="favicon.ico">
	<script src="nav.js"></script>
	<script src="sort.js"></script>
</head>
<body>
	<left-nav />
	<!-- Main Content Section -->
	<div class="main">
		<h2>Assessments</h2>
		<hr size="1" />
		<div>
			<div style="float: left;">
				<button type="button" class="tab selected">Active</button>
				<button type="button" class="tab">Inactive</button>
			</div>
			<div style="float: right;">
				<button type="button">
					<svg xmlns="http://www.w3.org/2000/svg"
						width="16" height="16" viewBox="0 0 24 24" fill="none"
						stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
						aria-hidden="true">
						<path d="M12 6v14"></path>
						<path d="M8 8v12"></path>
						<path d="M4 4v16"></path>
						<line x1="19" x2="19" y1="8" y2="14"></line>
						<line x1="22" x2="16" y1="11" y2="11"></line>
					</svg>
					Add Assessment
				</button>
			</div>
		</div>

		<div class="card-container">
			<div class="card" style="flex: 1;">
				<table id="myTable" style="margin-top: 16px;">
					<thead>
						<tr>
							<th onclick="sortTable(0)" style="text-wrap: nowrap;">Title</th>
							<th onclick="sortTable(1)" style="text-wrap: nowrap;">Measures</th>
							<th onclick="sortTable(2)" style="text-wrap: nowrap;">Results</th>
						</tr>
					</thead>
					<tbody>	
						<tr>
							<td>Kosmos Workforce Engagement</td>
							<td>Employee Engagement</td>
							<td>27</td>
						</tr>
						<tr>
							<td>Holland Matrix</td>
							<td>Employee Intrests</td>
							<td>20</td>
						</tr>
						<tr>
							<td>Polaris&trade; Planning</td>
			 				<td>Long term goals</td>
							<td>18</td>
						</tr>

					</tbody>
				</table>
				<div style="border-top: 1px solid var(--primary-color); padding-top: 8px; width: 50%; float: left;">
					<button type="button" class="inactive" style="margin-right: 8px;">◁ Previous</button>
					Page 1 of 1
				</div>
				<div style="border-top: 1px solid var(--primary-color); padding-top: 8px; width: 50%; float: right; text-align: right;">
					3 total
					<button type="button" class="inactive" style="margin-left: 8px;">Next ▷</button>
				</div>
			</div>
		</div>
		<div style="float: left;"></div>
		<div style="float: right;"></div>
	</div>
